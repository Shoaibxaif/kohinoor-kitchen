        ①
    </text>

    <line
        x1="145"
        y1="275"
        x2="240"
        y2="275"
        stroke="#C8A97A"
        stroke-width="2" />

    <text
        x="70"
        y="315"
        font-family="Inter"
        font-size="18"
        fill="#1A1A18">
        Sink
    </text>

    <!-- Hob -->

    <circle
        cx="660"
        cy="270"
        r="20"
        fill="#C8A97A" />

    <text
        x="660"
        y="277"
        text-anchor="middle"
        font-family="Inter"
        font-size="15"
        fill="white">
        ②
    </text>

    <line
        x1="640"
        y1="270"
        x2="575"
        y2="270"
        stroke="#C8A97A"
        stroke-width="2" />

    <text
        x="685"
        y="315"
        font-family="Inter"
        font-size="18"
        fill="#1A1A18">
        Hob
    </text>

    <!-- Refrigerator -->

    <circle
        cx="125"
        cy="460"
        r="20"
        fill="#C8A97A" />

    <text
        x="125"
        y="467"
        text-anchor="middle"
        font-family="Inter"
        font-size="15"
        fill="white">
        ③
    </text>

    <line
        x1="145"
        y1="460"
        x2="235"
        y2="460"
        stroke="#C8A97A"
        stroke-width="2" />

    <text
        x="40"
        y="505"
        font-family="Inter"
        font-size="18"
        fill="#1A1A18">
        Refrigerator
    </text>

    <!-- Work Triangle -->

    <path
        d="M285 275 L520 270 L280 460 Z"
        stroke="#C8A97A"
        stroke-width="4"
        stroke-dasharray="12 10"
        fill="none" />

    <!-- Corner Label -->

    <circle
        cx="405"
        cy="405"
        r="8"
        fill="#C8A97A" />

    <line
        x1="412"
        y1="412"
        x2="610"
        y2="500"
        stroke="#C8A97A"
        stroke-width="2" />

    <text
        x="625"
        y="505"
        font-family="Inter"
        font-size="18"
        fill="#1A1A18">
        Magic Corner Storage
