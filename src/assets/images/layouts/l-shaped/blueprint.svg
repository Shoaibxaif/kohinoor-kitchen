    <text x="450" y="105"
        text-anchor="middle"
        font-family="Inter"
        font-size="15"
        letter-spacing="4"
        fill="#C8A97A">
        WORK TRIANGLE LAYOUT
    </text>

    <!-- Outer Kitchen Shape -->
    <path
        d="
        M170 160
        H620
        V430
        H430
        V520
        H170
        Z"
        fill="#ffffff"
        stroke="#1A1A18"
        stroke-width="6"
        stroke-linejoin="round" />

    <!-- Countertop -->
    <path
        d="
        M195 185
        H595
        V405
        H405
        V495
        H195
        Z"
        fill="#ECE7DF" />

    <!-- Sink -->
    <rect
        x="240"
        y="245"
        width="90"
        height="60"
        rx="12"
        fill="#D8E6EC"
        stroke="#1A1A18"
        stroke-width="2" />

    <circle
        cx="285"
        cy="275"
        r="10"
        fill="#B6C8D1" />

    <!-- Hob -->
    <rect
        x="465"
        y="230"
        width="110"
        height="80"
        rx="10"
        fill="#2E2E2B" />

    <circle cx="490" cy="255" r="10" fill="#C8A97A" />
    <circle cx="550" cy="255" r="10" fill="#C8A97A" />
    <circle cx="490" cy="290" r="10" fill="#C8A97A" />
    <circle cx="550" cy="290" r="10" fill="#C8A97A" />

    <!-- Refrigerator -->
    <rect
