<svg width="900" height="650" viewBox="0 0 900 650" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <rect width="900" height="650" fill="#F8F6F1" />

    <!-- Title -->
    <text x="450" y="70"
        text-anchor="middle"
        font-family="Playfair Display"
        font-size="34"
