        stroke-width="2" />

    <line
        x1="277"
        y1="425"
        x2="277"
        y2="495"
        stroke="#999"
        stroke-width="2" />

    <!-- Magic Corner -->
    <path
        d="M400 400 L400 495 L315 495"
        stroke="#C8A97A"
        stroke-width="5"
        stroke-linecap="round" />

    <!-- Numbers -->

    <!-- Sink -->
    <circle
        cx="125"
        cy="275"
        r="20"
        fill="#C8A97A" />

    <text
        x="125"
        y="282"
        text-anchor="middle"
        font-family="Inter"
        font-size="15"
