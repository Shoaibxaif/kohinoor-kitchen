<svg width="900" height="650" viewBox="0 0 900 650" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="900" height="650" fill="#F8F6F1"/>


  <!-- L-Shaped Perimeter Wall Countertop -->
  <path
      d="M170 160 H730 V400 H640 V245 H170 Z"
      fill="#FFFFFF"
      stroke="#1A1A18"
      stroke-width="6"
      stroke-linejoin="round"/>
      
  <path
      d="M195 185 H705 V375 H665 V210 H195 Z"
      fill="#ECE7DF"/>

  <!-- Central Island Countertop -->
  <rect
      x="280"
      y="380"
      width="340"
      height="150"
      rx="4"
      fill="#FFFFFF"
      stroke="#1A1A18"
      stroke-width="6"/>
      
  <rect
      x="295"
      y="395"
      width="310"
      height="120"
      fill="#ECE7DF"/>

  <!-- Sink (Moved to Island) -->
  <rect
      x="330"
      y="425"
      width="90"
      height="60"
      rx="12"
      fill="#D8E6EC"
      stroke="#1A1A18"
      stroke-width="2"/>

  <circle
      cx="375"
      y="455"
      r="10"
      fill="#B6C8D1"/>

  <!-- Hob (Stays on back wall, centered) -->
  <rect
      x="420"
      y="160"
      width="120"
      height="70"
      rx="10"
      fill="#2E2E2B"/>

  <circle cx="448" cy="183" r="10" fill="#C8A97A"/>
  <circle cx="512" cy="183" r="10" fill="#C8A97A"/>
  <circle cx="448" cy="207" r="10" fill="#C8A97A"/>
  <circle cx="512" cy="207" r="10" fill="#C8A97A"/>

  <!-- Refrigerator (Right side of L-wall) -->
  <rect
      x="640"
      y="260"
      width="90"
      height="90"
      rx="8"
      fill="#DADADA"
      stroke="#1A1A18"
      stroke-width="2"/>

  <line
      x1="685"
      y1="265"
      x2="685"
      y2="345"
      stroke="#999"
      stroke-width="2"/>

  <!-- Pantry Unit (Left side of L-wall) -->
  <rect
      x="170"
      y="160"
      width="60"
      height="85"
      rx="4"
      fill="#D8D2C8"
      stroke="#1A1A18"
      stroke-width="2"/>

  <!-- Island Seating Stools -->
  <circle cx="350" cy="565" r="16" fill="#D8D2C8" stroke="#1A1A18" stroke-width="2"/>
  <circle cx="450" cy="565" r="16" fill="#D8D2C8" stroke="#1A1A18" stroke-width="2"/>
  <circle cx="550" cy="565" r="16" fill="#D8D2C8" stroke="#1A1A18" stroke-width="2"/>

  <!-- Work Triangle Paths -->
  <!-- Sink (375,455) to Hob (480,195) to Fridge (685,305) -->
  <path
      d="M375 455 L480 195 L685 305 Z"
      stroke="#C8A97A"
      stroke-width="4"
      stroke-dasharray="12 10"
      fill="none"/>

  <!-- ① Sink Indicator (Island) -->
  <circle cx="165" cy="455" r="20" fill="#C8A97A"/>
  <text x="165" y="462" text-anchor="middle" font-family="Inter" font-size="15" fill="white">①</text>
  <line x1="185" y1="455" x2="330" y2="455" stroke="#C8A97A" stroke-width="2"/>
  <text x="85" y="460" font-family="Inter" font-size="18" fill="#1A1A18">Sink</text>

  <!-- ② Hob Indicator (Back Wall) -->
  <circle cx="480" cy="95" r="20" fill="#C8A97A"/>
  <text x="480" y="102" text-anchor="middle" font-family="Inter" font-size="15" fill="white">②</text>
  <line x1="480" y1="115" x2="480" y2="160" stroke="#C8A97A" stroke-width="2"/>
  <text x="515" y="98" font-family="Inter" font-size="18" fill="#1A1A18">Hob</text>

  <!-- ③ Refrigerator Indicator (Perimeter Right) -->
  <circle cx="810" cy="305" r="20" fill="#C8A97A"/>
  <text x="810" y="312" text-anchor="middle" font-family="Inter" font-size="15" fill="white">③</text>
  <line x1="790" y1="305" x2="730" y2="305" stroke="#C8A97A" stroke-width="2"/>
  <text x="765" y="350" font-family="Inter" font-size="18" fill="#1A1A18">Fridge</text>

  <!-- Pantry Label -->
  <line x1="200" y1="160" x2="110" y2="115" stroke="#C8A97A" stroke-width="2"/>
  <text x="45" y="110" font-family="Inter" font-size="18" fill="#1A1A18">Pantry</text>

  <!-- Island Seating Label -->
  <line x1="550" cy="585" x2="630" y2="615" stroke="#C8A97A" stroke-width="2"/>
  <text x="645" y="620" font-family="Inter" font-size="18" fill="#1A1A18">Breakfast Bar</text>

</svg>
