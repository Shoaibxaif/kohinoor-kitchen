<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Define reusable styles -->
  <defs>
    <style type="text/css">
      .main-title { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: bold; fill: #111; }
      .sub-title { font-family: 'Open Sans', sans-serif; font-size: 24px; font-weight: 300; fill: #111; text-transform: uppercase; letter-spacing: 2px; }
      .label-text { font-family: 'Open Sans', sans-serif; font-size: 28px; font-weight: bold; fill: #111; }
      .dimension-text { font-family: 'Open Sans', sans-serif; font-size: 24px; font-weight: normal; fill: #111; text-anchor: middle; }
      .callout-circle { fill: #c4a77d; stroke: none; }
      .callout-number { font-family: 'Open Sans', sans-serif; font-size: 22px; font-weight: bold; fill: #fff; text-anchor: middle; }
      .counter-fill { fill: #f1ebd8; }
      .wall-line { stroke: #111; stroke-width: 4; fill: none; }
      .cabinet-line { stroke: #999; stroke-width: 1.5; fill: none; }
      .faucet { stroke: #333; stroke-width: 2.5; fill: none; }
      .grate { fill: #333; }
      .burner { fill: #c4a77d; }
      .fridge-shelf { stroke: #bbb; stroke-width: 1; fill: none; }
      .leader-line { stroke: #999; stroke-width: 1; fill: none; }
      .point-dot { fill: #c4a77d; stroke: none; }
    </style>
    
    <!-- Pattern for sink grate -->
    <pattern id="sinkGrate" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="#666" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="#f8f8f8" />

  <!-- Main counter outline and fill -->
  <path d="M 130 460 L 130 200 L 870 200 L 870 420" class="wall-line" />
  <path d="M 130 200 L 870 200 L 870 420 L 750 420 L 750 250 L 130 250 Z" class="counter-fill" />
  
  <!-- Dimension Lines -->
  <!-- Vertical (240) -->
  <line x1="110" y1="200" x2="110" y2="440" stroke="#111" stroke-width="1.5" />
  <line x1="90" y1="200" x2="130" y2="200" stroke="#111" stroke-width="1.5" />
  <line x1="90" y1="440" x2="130" y2="440" stroke="#111" stroke-width="1.5" />
  <text x="100" y="320" class="dimension-text" transform="rotate(-90 100 320)">240</text>
  
  <!-- Horizontal (600) -->
  <line x1="130" y1="480" x2="870" y2="480" stroke="#111" stroke-width="1.5" />
  <line x1="130" y1="460" x2="130" y2="500" stroke="#111" stroke-width="1.5" />
  <line x1="870" y1="460" x2="870" y2="500" stroke="#111" stroke-width="1.5" />
  <text x="500" y="520" class="dimension-text">600</text>

  <!-- Sink (1) -->
  <rect x="300" y="210" width="110" height="70" rx="8" ry="8" stroke="#333" stroke-width="2.5" fill="#f8f8f8" />
  <rect x="310" y="220" width="90" height="50" rx="5" ry="5" fill="url(#sinkGrate)" />
  <path d="M 355 240 Q 365 240 365 230" class="faucet" />
  <line x1="365" y1="230" x2="365" y2="215" class="faucet" />
  <path d="M 345 240 Q 345 230 355 230" class="faucet" />

  <!-- Pantry Unit -->
  <rect x="440" y="200" width="110" height="50" class="cabinet-line" />
  <rect x="440" y="200" width="110" height="30" fill="#f1ebd8" stroke="none"/>
  <circle cx="495" cy="230" r="10" fill="#c4a77d" />

  <!-- Hob (2) -->
  <rect x="580" y="210" width="110" height="70" rx="10" ry="10" class="grate" />
  <circle cx="610" cy="235" r="8" class="burner" />
  <circle cx="610" cy="255" r="8" class="burner" />
  <circle cx="635" cy="235" r="8" class="burner" />
  <circle cx="635" cy="255" r="8" class="burner" />
  <circle cx="660" cy="235" r="8" class="burner" />
  <circle cx="660" cy="255" r="8" class="burner" />

  <!-- Refrigerator (3) -->
  <rect x="750" y="200" width="100" height="90" class="wall-line" />
  <rect x="750" y="200" width="100" height="90" fill="#ddd" stroke="none" />
  <line x1="750" y1="230" x2="850" y2="230" class="fridge-shelf" />
  <line x1="750" y1="260" x2="850" y2="260" class="fridge-shelf" />
  <path d="M 860 210 Q 865 210 865 215 L 865 275 Q 865 280 860 280 L 850 280" stroke="#bbb" stroke-width="2" fill="none" />

  <!-- Cabinet dividers and other details -->
  <line x1="130" y1="250" x2="750" y2="250" class="cabinet-line" />
  <line x1="440" y1="200" x2="440" y2="250" class="cabinet-line" />
  <line x1="550" y1="200" x2="550" y2="250" class="cabinet-line" />
  <line x1="580" y1="200" x2="580" y2="250" class="cabinet-line" />
  <line x1="690" y1="200" x2="690" y2="250" class="cabinet-line" />

  <!-- Callouts and Leader Lines -->
  
  <!-- Countertop (Top Left) -->
  <text x="140" y="170" class="label-text">countertop</text>
  <line x1="200" y1="180" x2="200" y2="230" class="leader-line" />
  <circle cx="200" cy="230" r="10" class="point-dot" />

  <!-- Pantry Unit (Top) -->
  <text x="440" y="170" class="label-text">Pantry Unit</text>
  <line x1="495" y1="180" x2="495" y2="215" class="leader-line" />
  <circle cx="495" cy="215" r="10" class="point-dot" />

  <!-- Hob (Top, with number 2) -->
  <line x1="635" y1="180" x2="635" y2="225" class="leader-line" />
  <circle cx="635" cy="225" r="10" class="point-dot" />
  <circle cx="600" y="160" r="20" class="callout-circle" />
  <text x="600" y="168" class="callout-number">2</text>
  <text x="635" y="170" class="label-text">Hob</text>

  <!-- Refrigerator (Top, with number 3) -->
  <line x1="800" y1="180" x2="800" y2="230" class="leader-line" />
  <circle cx="800" cy="230" r="10" class="point-dot" />
  <circle cx="740" y="160" r="20" class="callout-circle" />
  <text x="740" y="168" class="callout-number">3</text>
  <text x="775" y="170" class="label-text">Refrigerator</text>

  <!-- Seating Area (Bottom Left) -->
  <text x="140" y="520" class="label-text">Seating Area</text>
  <line x1="200" y1="510" x2="200" y2="400" class="leader-line" />
  <circle cx="200" cy="400" r="10" class="point-dot" />

  <!-- Sink (Bottom, with number 1) -->
  <line x1="355" y1="300" x2="355" y2="380" class="leader-line" />
  <circle cx="355" cy="300" r="10" class="point-dot" />
  <circle cx="355" cy="420" r="20" class="callout-circle" />
  <text x="355" y="428" class="callout-number">1</text>
  <text x="330" y="460" class="label-text">Sink</text>

  <!-- Bottom Labels -->
  <circle cx="635" y="420" r="20" class="callout-circle" />
  <text x="635" y="428" class="callout-number">2</text>
  <text x="620" y="460" class="label-text">Hob</text>

  <circle cx="800" y="420" r="20" class="callout-circle" />
  <text x="800" y="428" class="callout-number">3</text>
  <text x="735" y="460" class="label-text">Refrigerator</text>

</svg>
